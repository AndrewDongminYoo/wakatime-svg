<svg xmlns="http://www.w3.org/2000/svg" width="360" height="206">
  <style>
    svg {
      font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif, Apple Color Emoji, Segoe UI Emoji;
      font-size: 14px;
      line-height: 21px;
    }

    #background {
      width: calc(100% - 10px);
      height: calc(100% - 10px);
      fill: #00000000;
      stroke: #8B8B8B22;
      stroke-width: 1px;
    }

    foreignObject {
      width: 328px;
      height: 182px;
    }

    .wrap {
      width: 100%;
      height: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 10px;
      line-height: 28px;
      font-size: 16px;
      font-weight: 600;
      color: rgb(72, 148, 224);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rows {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .row {
      display: grid;
      gap: 10px;
      align-items: center;
      height: 26px;

      transform: translateX(-500%);
      animation-name: slideIn;
      animation-duration: 1s;
      animation-function: ease-in-out;
      animation-fill-mode: forwards;
    }

    .row.language {
      grid-template-columns: 5px 70px 75px 1fr 32px;
    }

    .row.project {
      grid-template-columns: minmax(120px, 1.3fr) 1fr 54px;
    }

    @keyframes slideIn {
      to {
        transform: translateX(0);
      }
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      display: inline-block;
      box-shadow: 0 0 0 1px #00000012;
    }

    .lang {
      font-size: 12px;
      font-weight: 600;
      color: rgb(135, 135, 135);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .time {
      font-size: 12px;
      color: rgb(150, 150, 150);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .project-time {
      text-align: right;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.05rem;
    }

    .percent {
      font-size: 12px;
      color: rgb(150, 150, 150);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .bar-background {
      display: flex;
      height: 8px;
      border-radius: 999px;
      background: #8B8B8B22;
      overflow: hidden;
    }

    .bar-fill {
      display: block;
      height: 100%;
      border-radius: 999px;
      opacity: 0.9;
      flex: 0 0 auto;
    }

    .bar-additions,
    .bar-deletions {
      display: block;
      height: 100%;
      flex: 0 0 auto;
    }

    .bar-additions {
      background: #23d18b;
    }

    .bar-deletions {
      background: #f37c7c;
    }
  </style>

  <rect id="background" x="6" y="6" rx="6" ry="6" width="348" height="194" fill="none" stroke="#8B8B8B22" stroke-width="1"/>

  <foreignObject x="16" y="12" width="328" height="182">
    <div xmlns="http://www.w3.org/1999/xhtml" class="wrap">
      <h2>Projects (+/-) · 61 hours 1 minute</h2>
      <ul class="rows">
        <li class="row project" style="animation-delay:0ms;">
          <span class="lang" title="portfolio">portfolio</span>
          <span class="bar" title="+ 51% / - 49%">
            <span class="bar-background">
              <span class="bar-additions" style="width:50.8574%;"></span>
              <span class="bar-deletions" style="width:49.1426%;"></span>
            </span>
          </span>
          <span class="time project-time" title="31 h 47 m">31 h 47 m</span>
        </li>
        <li class="row project" style="animation-delay:150ms;">
          <span class="lang" title="cami-flutter">cami-flutter</span>
          <span class="bar" title="+ 64% / - 36%">
            <span class="bar-background">
              <span class="bar-additions" style="width:63.6476%;"></span>
              <span class="bar-deletions" style="width:36.3524%;"></span>
            </span>
          </span>
          <span class="time project-time" title="11 h 13 m">11 h 13 m</span>
        </li>
        <li class="row project" style="animation-delay:300ms;">
          <span class="lang" title="ble_proximity_signal">ble_proximity_signal</span>
          <span class="bar" title="+ 97% / - 3%">
            <span class="bar-background">
              <span class="bar-additions" style="width:96.7590%;"></span>
              <span class="bar-deletions" style="width:3.2410%;"></span>
            </span>
          </span>
          <span class="time project-time" title="8 h 38 m">8 h 38 m</span>
        </li>
        <li class="row project" style="animation-delay:450ms;">
          <span class="lang" title="clarity_flutter">clarity_flutter</span>
          <span class="bar" title="+ 73% / - 27%">
            <span class="bar-background">
              <span class="bar-additions" style="width:72.8878%;"></span>
              <span class="bar-deletions" style="width:27.1122%;"></span>
            </span>
          </span>
          <span class="time project-time" title="4 h 39 m">4 h 39 m</span>
        </li>
        <li class="row project" style="animation-delay:600ms;">
          <span class="lang" title="wakatime-svg">wakatime-svg</span>
          <span class="bar" title="+ 52% / - 48%">
            <span class="bar-background">
              <span class="bar-additions" style="width:51.8089%;"></span>
              <span class="bar-deletions" style="width:48.1911%;"></span>
            </span>
          </span>
          <span class="time project-time" title="1 h 57 m">1 h 57 m</span>
        </li>
      </ul>
    </div>
  </foreignObject>
</svg>